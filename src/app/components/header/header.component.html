<header class="app-header glass-nav">
  <div class="container container-custom">
    <nav class="navbar navbar-expand-md navbar-dark p-0">
      <a class="navbar-brand d-flex align-items-center" routerLink="/">
        <img src="/assets/logo/Generative (1).png" class="logo-img" alt="Generative IT Solution">
        <span class="brand-text">Generative IT Solution</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav nav-links">
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/services" routerLinkActive="active">Services</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-cta" routerLink="/contacts" routerLinkActive="active">Contact</a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</header>
